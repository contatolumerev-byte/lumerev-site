  items:
    - name: "Diagnóstico & Auditoria de Receita (The Deep Dive)"
      description: "Uma imersão holística no seu ecossistema comercial. Investigamos não apenas os dados brutos, mas as pessoas e a cultura por trás deles. Identificamos gargalos ocultos que impedem o crescimento — desde a falta de maturidade data-driven e gaps de treinamento, até CRMs com alta fricção que afastam o vendedor. Descobrimos o que está blocoando sua previsibilidade de receita e sua força de vendas."
    - name: "Revenue Architecture & Modelagem de Processos"
      description: "Reestruturação completa da jornada do cliente, unindo marketing, vendas e CS sob a mesma página. Criamos pontes para que o marketing e o comercial parem de falar línguas diferentes, desenhamos playbooks estratégicos de passagem de bastão e reduzimos o retrabalho operacional para que o seu time foque em fechar contas."
    - name: "Estratégia de Dados & Inteligência Comercial"
      description: "Modelagem estratégica de indicadores e BI para tomada de decisão em tempo real. Garantimos que sua stack de tecnologia funcione como um espelho fiel da sua estratégia de negócios, desenhada sob medida para que a sua equipe consiga usar com fluidez, sem burocracia desnecessária."

