# 2. Seção Sobre a Lume Rev (O Manifesto)
manifesto:
  title: "Estratégia sem execução é apenas ruído."
  text: "Na Lume Rev, não acreditamos em receitas prontas de prateleira. Nosso modelo de atuação é exclusivo, personalizado e próximo, focado na realidade de cada negócio. Nós eliminamos os gargalos operacionais e de dados entre marketing, vendas e pós-vendas, implementando a infraestrutura e a mentalidade que times de alta performance precisam para performar. Afinal, uma operação eficiente só funciona se houver uma cultura forte por trás. Mais do que organizar fluxos, entregamos a previsibilidade de receita que a sua empresa precisa para sustentar um posicionamento correto, competitivo e de alta autoridade no mercado de tecnologia — porque a forma como a sua operação roda por dentro determina a confiança e a relevância que a sua marca projeta por fora."

# 3. Nossos Serviços
servicos:
  title: "Nossos Serviços"
  cta_text: "Descubra o gargalo da sua operação"
